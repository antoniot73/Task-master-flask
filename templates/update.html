{% extends 'base.html' %}

{% block title %}Actualizar tarea{% endblock %}

{% block body %}
<section class="card narrow">
    <h1>Actualizar tarea</h1>
    <p class="subtitle">Modifica el contenido, prioridad o estado.</p>

    {% if error %}
        <div class="alert">{{ error }}</div>
    {% endif %}

    <form action="/update/{{ task.id }}" method="POST" class="task-form vertical">
        <label for="content">Contenido</label>
        <input type="text" name="content" id="content" value="{{ task.content }}">

        <label for="priority">Prioridad</label>
        <select name="priority" id="priority">
            <option value="Alta" {% if task.priority == 'Alta' %}selected{% endif %}>Alta</option>
            <option value="Media" {% if task.priority == 'Media' %}selected{% endif %}>Media</option>
            <option value="Baja" {% if task.priority == 'Baja' %}selected{% endif %}>Baja</option>
        </select>

        <label class="checkbox">
            <input type="checkbox" name="completed" {% if task.completed %}checked{% endif %}>
            Marcar como completada
        </label>

        <button type="submit">Actualizar tarea</button>
        <a href="/" class="back-link">Volver</a>
    </form>
</section>
{% endblock %}
